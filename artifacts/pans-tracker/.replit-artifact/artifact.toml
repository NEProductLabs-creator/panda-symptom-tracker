kind = "web"
previewPath = "/"
title = "PANS/PANDAS Tracker"
version = "1.0.0"
id = "artifacts/pans-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22858

[services.development]
run = "pnpm --filter @workspace/pans-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pans-tracker", "run", "build" ]
publicDir = "artifacts/pans-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22858"
BASE_PATH = "/"
